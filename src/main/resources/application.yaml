spring:
  application:
    name: core-client-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:6432/${DB_NAME}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        format_sql: false
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}
    client-id: ${KAFKA_CLIENT_ID}
    properties:
      security.protocol: SASL_SSL
      sasl:
        mechanism: PLAIN
        jaas:
          config: ${CONFLUENT_API_KEY}
      session.timeout.ms: 45000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        acks: all
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
server:
    port: 8080
app:
  kafka:
    customer-topic: core.customer.events

---
spring:
  config:
    activate:
      on-profile: kubernetes

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO