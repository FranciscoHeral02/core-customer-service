apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-client-service
  namespace: core-banking
  labels:
    app: core-client-service
  annotations:
    secrets.doppler.com/reload: "true"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: core-client-service
  template:
    metadata:
      labels:
        app: core-client-service
    spec:
      containers:
        - name: app
          image: FranciscoHeral02/core-client-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http

          # CONTROL NATIVO DE VARIABLES (Alineado con tu YAML de Spring)
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"

            # --- 1. CONFIGURACIÓN DE POSTGRESQL (VÍA PGBOUNCER EN PUERTO 6432) ---
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: core-client-service-doppler-secret
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: core-client-service-doppler-secret
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: core-client-service-doppler-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: core-client-service-doppler-secret
                  key: DB_PASSWORD

            # --- 2. CONFIGURACIÓN DE APACHE KAFKA (SASL_SSL / CONFLUENT CLOUD) ---
            - name: KAFKA_SERVERS
              valueFrom:
                secretKeyRef:
                  name: core-client-service-doppler-secret
                  key: KAFKA_SERVERS
            - name: KAFKA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: core-client-service-doppler-secret
                  key: KAFKA_CLIENT_ID
            - name: CONFLUENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: core-client-service-doppler-secret
                  key: CONFLUENT_API_KEY # Tu string completo: 'org.apache.kafka.common.security.plain.PlainLoginModule required...'

          # SONDAS DE SALUD DE SPRING ACTUATOR (Escuchando en el puerto 8080)
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2

          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "350Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: core-client-service
  namespace: core-banking
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: core-client-service
