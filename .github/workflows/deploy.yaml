name: CI/CD Microservicio Clientes

on:
  push:
    branches: [develop, master]
    paths-ignore:
      - 'README.md'
      - '.github/workflows/deploy.yaml'
env:
  IMAGE: docker.io/franciscoheral02/core-client-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn clean test
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build jar
        run: mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          mvn spring-boot:build-image \
            -Dspring-boot.build-image.imageName=$IMAGE:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.sha }}

  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Set K8s context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy (create or update)
        run: | 
          kubectl apply -f k8s/dev/

      - name: Rollout status
        run: |
          kubectl rollout status deployment/core-client-service \
            -n apps \
            --timeout=5m