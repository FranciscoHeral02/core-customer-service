name: CI/CD Microservicio Clientes

on:
  push:
    branches:
      - develop
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Ejecuta tus tests unitarios (JUnit + JaCoCo) para medir la cobertura de tu dominio rich
      # Si un test falla, el pipeline se congela y no avanza al despliegue
      - name: Compilar y Probar con Maven
        run: mvn clean test

  # LLAMADA DIRECTA A TU LIBRERÍA CENTRALIZADA REUTILIZABLE
  deploy:
    needs: build-and-test
    # Apunta al repositorio central donde guardaste la plantilla estándar
    uses: FranciscoHeral02/devops-templates/.github/workflows/deploy-msv-template.yaml@master
    with:
      # Lógica dinámica: Si el push es en master va a k8s/prod/, si no va a k8s/dev/
      capa: ${{ github.ref_name == 'master' && 'prod' || 'dev' }}
    secrets: inherit