name: CI/CD Microservicio Clientes

on:
  push:
    branches: [develop, master]
    paths-ignore:
      - .github/workflows/**
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Tests
        run: mvn clean test

      - name: Package
        run: mvn clean package -DskipTests

      - name: Build Image
        run: |
          mvn spring-boot:build-image \
            -Dspring-boot.build-image.imageName=franciscoheral02/core-client-service:${{ github.sha }}

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image
        run: |
          docker push franciscoheral02/core-client-service:${{ github.sha }}

  deploy:
    needs: build
    uses: FranciscoHeral02/devops-templates/.github/workflows/deploy-msv-template.yaml@master
    with:
      capa: ${{ github.ref_name == 'master' && 'prod' || 'dev' }}
    secrets: inherit